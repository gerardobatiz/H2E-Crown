<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H2E — iSolve Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">H2E &nbsp;|&nbsp; <em>Crown City Trading</em> &nbsp;— iSolve Dashboard</div>
  <span id="ts">Not loaded</span>
</header>

<nav class="tabs" id="tabs"></nav>

<main>
  <div class="filters" id="filters"></div>
  <div id="col-filters"></div>
  <div id="season-pills"></div>
  <div class="kpis" id="kpis"></div>
  <div class="tcard">
    <div class="thead-bar">
      <h3 id="ttitle">—</h3>
      <div class="acts">
        <input class="search" id="search" type="text" placeholder="Search table…" oninput="applyRender()">
        <select id="labelSel" onchange="filterByLabel(this.value)"
                style="display:none;padding:6px 10px;border:1px solid var(--border);border-radius:7px;
                       font-size:12px;background:var(--bg);color:var(--text);outline:none;
                       cursor:pointer;min-width:120px">
          <option value="">All Labels</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="exportCSV()">⬇ CSV</button>
        <button class="btn btn-outline btn-sm" id="pdfBtn" onclick="exportPDF()">⬇ PDF</button>
        <button class="btn btn-primary btn-sm" onclick="loadData()">↻ Refresh</button>
      </div>
    </div>
    <div class="twrap" id="twrap"><div class="empty">Select a module and click Load Data</div></div>
    <div class="sbar"><span id="sl">—</span><span id="sr">—</span></div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
