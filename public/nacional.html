<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H2E — Ventas Nacional (CBE)</title>
<link rel="stylesheet" href="styles.css">
<style>
  .section-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .06em; color: var(--text2); margin: 20px 0 10px;
  }

  /* Acum summary cards */
  .acum-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px; margin-bottom: 4px;
  }
  .acum-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
  }
  .acum-card h4 {
    font-size: 13px; font-weight: 700; color: var(--gm);
    margin: 0 0 10px; text-transform: capitalize;
    border-bottom: 1px solid var(--border); padding-bottom: 7px;
  }
  .acum-row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px; padding: 4px 0; color: var(--text2);
    border-bottom: 1px solid var(--bg2);
  }
  .acum-row:last-child { border-bottom: none; }
  .acum-row.hl { color: var(--text); font-weight: 600; }
  .acum-row .val { font-variant-numeric: tabular-nums; }

  /* Product tabs */
  .prod-tabs {
    display: flex; gap: 0; margin-bottom: 0;
    border-bottom: 2px solid var(--border);
  }
  .prod-tab {
    padding: 8px 22px; font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1px solid transparent; border-bottom: none; border-radius: 8px 8px 0 0;
    color: var(--text2); background: transparent; transition: all .15s;
    margin-bottom: -2px;
  }
  .prod-tab:hover  { background: var(--bg2); color: var(--text); }
  .prod-tab.active { background: var(--bg); color: var(--text);
                     border-color: var(--border); border-bottom-color: var(--bg); }
  .prod-tab.totales { font-weight: 700; color: var(--gm); }
  .prod-tab.totales.active { color: var(--gm); }

  /* Filters */
  .filters-bar {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .filter-label { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .filter-select, .filter-date {
    font-size: 12px; padding: 4px 8px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--text); cursor: pointer;
  }
  .filter-select { min-width: 140px; }
  .filter-select:focus, .filter-date:focus { outline: none; border-color: var(--gm); }
  .filter-sep { color: var(--text2); font-size: 11px; }

  /* Sortable headers */
  th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
  th.sortable:hover { background: rgba(0,0,0,.06); }
  th.sort-asc::after  { content: ' ↑'; opacity: .8; }
  th.sort-desc::after { content: ' ↓'; opacity: .8; }

  /* Totals footer */
  tfoot td {
    font-weight: 700; background: var(--bg2);
    border-top: 2px solid var(--border);
    font-size: 11px; padding: 4px 6px;
  }

  /* Table helpers */
  .num-col { text-align: right; font-variant-numeric: tabular-nums; }
  .neg { color: #e74c3c; }
  .dim { color: var(--text2); }

  /* Cobros section */
  .cobros-tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 2px solid var(--border); margin-top: 6px; }
  .cobros-tab {
    padding: 8px 22px; font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1px solid transparent; border-bottom: none; border-radius: 8px 8px 0 0;
    color: var(--text2); background: transparent; transition: all .15s; margin-bottom: -2px;
  }
  .cobros-tab:hover  { background: var(--bg2); color: var(--text); }
  .cobros-tab.active { background: var(--bg); color: var(--text); border-color: var(--border); border-bottom-color: var(--bg); }

  /* Status chips */
  .chip { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .chip-ok  { background: #d4edda; color: #155724; }
  .chip-pen { background: #fff3cd; color: #856404; }

  /* Upload button */
  .btn-upload { font-size: 11px; padding: 3px 8px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg2); color: var(--text2); cursor: pointer; white-space: nowrap; }
  .btn-upload:hover { border-color: var(--gm); color: var(--gm); }
  .link-pdf { font-size: 11px; color: var(--gm); text-decoration: none; }
  .link-pdf:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <div class="logo">H2E &nbsp;|&nbsp; <em>CBE</em> &nbsp;— Ventas Nacional</div>
  <span id="ts">Cargando…</span>
</header>

<main>

  <!-- Grand total KPIs at top -->
  <div class="kpis" id="kpis"></div>

  <!-- Summary by product -->
  <div class="section-title">Resumen por producto</div>
  <div class="acum-grid" id="acumGrid"></div>

  <!-- Detail table -->
  <div class="tcard">
    <div class="thead-bar">
      <h3 id="ttitle" style="margin:0">—</h3>
      <div class="acts">
        <input class="search" id="search" type="text" placeholder="Buscar…" oninput="applyRender()">
        <button class="btn btn-outline btn-sm" onclick="exportCSV()">⬇ CSV</button>
        <button class="btn btn-primary btn-sm" onclick="loadData()">↻ Actualizar</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <span class="filter-label">Fecha:</span>
      <input class="filter-date" id="fDesde" type="date" onchange="applyRender()" title="Desde">
      <span class="filter-sep">—</span>
      <input class="filter-date" id="fHasta" type="date" onchange="applyRender()" title="Hasta">
      <span class="filter-label" style="margin-left:8px">Cliente:</span>
      <select class="filter-select" id="fCliente" onchange="applyRender()"><option value="">Todos</option></select>
      <button class="btn btn-outline btn-sm" onclick="clearFilters()">✕ Limpiar</button>
    </div>

    <div class="prod-tabs" id="prodTabs"></div>

    <div class="twrap" id="twrap"><div class="empty">Cargando…</div></div>
    <div class="sbar"><span id="sl">—</span><span id="sr">—</span></div>
  </div>

  <!-- Cobros / Estado de Cuenta -->
  <div class="section-title" style="margin-top:28px">Estado de Cuenta — Cobros</div>
  <div class="cobros-tabs" id="cobrosTabs"></div>
  <div class="tcard">
    <div class="twrap" id="cobrosWrap"><div class="empty">Cargando…</div></div>
    <div class="sbar"><span id="cobrosSL">—</span><span id="cobrosSR">—</span></div>
  </div>

</main>

<script>
/* ── State ──────────────────────────────────────────────────────────────────── */
let allData         = {};
let activeProduct   = '';
let sortCol         = 'Fecha';
let sortDir         = -1;
let cobrosData      = {};
let activeCobros    = '';
let pdfList         = {};

/* ── Load ───────────────────────────────────────────────────────────────────── */
async function loadData() {
  document.getElementById('ts').textContent = 'Cargando…';
  try {
    const [res, cobrosRes] = await Promise.all([
      fetch('/api/nacional'),
      fetch('/api/cobros')
    ]);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); }
    catch { throw new Error('El servidor devolvió HTML en lugar de JSON — reinicia node server.js'); }
    if (!res.ok) throw new Error(data.error || res.statusText);
    allData       = data;
    activeProduct = data.products[0] || '';
    pdfList       = data.manifiestos || {};

    cobrosData = cobrosRes.ok ? await cobrosRes.json() : { products: [], sheets: {}, comprobantes: {} };
    activeCobros = (cobrosData.products || [])[0] || '';

    renderAll();
    document.getElementById('ts').textContent = `Actualizado: ${new Date().toLocaleTimeString('es-MX')}`;
  } catch (err) {
    document.getElementById('ts').textContent = 'Error';
    document.getElementById('twrap').innerHTML =
      `<div class="empty" style="color:#e74c3c">Error: ${escHtml(err.message)}</div>`;
  }
}

function renderAll() {
  renderKPIs();
  renderAcum();
  renderProdTabs();
  populateFilters();
  applyRender();
  renderCobrosTabs();
  renderCobrosTable();
}

/* ── Acum cards ─────────────────────────────────────────────────────────────── */
const ACUM_LABELS = {
  'venta':        'Venta bruta',
  'comision cbe': 'Comisión CBE',
};
const ACUM_SHOW = new Set(['venta', 'comision cbe']);
const ACUM_HL   = new Set();

function renderAcum() {
  const { acum } = allData;
  if (!acum?.length) { document.getElementById('acumGrid').innerHTML = ''; return; }
  document.getElementById('acumGrid').innerHTML = acum.map(row => {
    const prod   = row['Producto'] || '—';
    const fields = Object.entries(row).filter(([k]) => ACUM_SHOW.has(k.toLowerCase()));
    return `<div class="acum-card">
      <h4>${escHtml(prod)}</h4>
      ${fields.map(([k, v]) => {
        const label = ACUM_LABELS[k.toLowerCase()] || k;
        const hl    = ACUM_HL.has(k.toLowerCase());
        return `<div class="acum-row${hl ? ' hl' : ''}">
          <span>${escHtml(label)}</span><span class="val">${fmtAmt(v)}</span>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

/* ── KPI totals ─────────────────────────────────────────────────────────────── */
function renderKPIs() {
  const { acum } = allData;
  if (!acum?.length) { document.getElementById('kpis').innerHTML = ''; return; }
  const sum  = key => acum.reduce((s, r) => s + (r[key] ?? 0), 0);
  const kpis = [
    { label: 'Venta total',  value: fmtAmt(sum('venta')) },
    { label: 'Comisión CBE', value: fmtAmt(sum('comision cbe')) },
  ];
  document.getElementById('kpis').innerHTML = kpis.map(k =>
    `<div class="kpi"><div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div></div>`
  ).join('');
}

/* ── Product tabs ───────────────────────────────────────────────────────────── */
function renderProdTabs() {
  const { products, sheets } = allData;
  const tabs = [...products, 'Totales'];
  document.getElementById('prodTabs').innerHTML = tabs.map(p => {
    const isTot = p === 'Totales';
    const n = isTot
      ? products.reduce((s, prod) => s + (sheets[prod] || []).length, 0)
      : (sheets[p] || []).length;
    return `<div class="prod-tab${p === activeProduct ? ' active' : ''}${isTot ? ' totales' : ''}"
      onclick="switchProduct('${escHtml(p)}')">${escHtml(p)} <span style="font-size:10px;opacity:.6">${n}</span></div>`;
  }).join('');
}

function switchProduct(name) {
  activeProduct = name;
  sortCol = 'Fecha'; sortDir = -1;
  renderProdTabs();
  document.getElementById('search').value = '';
  populateFilters();
  applyRender();
}

/* ── Get active rows ────────────────────────────────────────────────────────── */
function getActiveRows() {
  const { products, sheets } = allData;
  if (activeProduct === 'Totales')
    return products.flatMap(p => (sheets[p] || []).map(r => ({ ...r, _Producto: p })));
  return (sheets[activeProduct] || []);
}

/* ── Date parsing ───────────────────────────────────────────────────────────── */
function parseDate(v) {
  if (!v) return null;
  const s = String(v).trim();
  // dd/mm/yy or dd/mm/yyyy
  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) {
    let y = m[3].length === 2 ? '20' + m[3] : m[3];
    return new Date(+y, +m[2] - 1, +m[1]);
  }
  // mm/dd/yyyy (US fallback)
  m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{2,4})$/);
  if (m) {
    let y = m[3].length === 2 ? '20' + m[3] : m[3];
    return new Date(+y, +m[2] - 1, +m[1]);
  }
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

/* ── Filters ────────────────────────────────────────────────────────────────── */
function populateFilters() {
  const rows = getActiveRows();
  fillSelect('fCliente', 'Todos', uniq(rows, 'Cliente'));
}

function uniq(rows, col) {
  return [...new Set(rows.map(r => r[col]).filter(Boolean))].sort();
}

function fillSelect(id, placeholder, options) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = `<option value="">${placeholder}</option>` +
    options.map(v => `<option value="${escHtml(String(v))}"${String(v) === cur ? ' selected' : ''}>${escHtml(String(v))}</option>`).join('');
}

function clearFilters() {
  document.getElementById('fDesde').value   = '';
  document.getElementById('fHasta').value   = '';
  document.getElementById('fCliente').value = '';
  document.getElementById('search').value   = '';
  applyRender();
}

/* ── Sort ───────────────────────────────────────────────────────────────────── */
function toggleSort(col) {
  if (sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  applyRender();
}

function sortRows(rows, col) {
  if (!col) return rows;
  return [...rows].sort((a, b) => {
    let va = a[col] ?? '', vb = b[col] ?? '';
    if (NUM_COLS.has(col)) {
      va = parseFloat(va) || 0;
      vb = parseFloat(vb) || 0;
      return sortDir * (va - vb);
    }
    if (col === 'Fecha') {
      const da = parseDate(va), db = parseDate(vb);
      if (da && db) return sortDir * (da - db);
    }
    return sortDir * String(va).localeCompare(String(vb), 'es');
  });
}

/* ── Table ──────────────────────────────────────────────────────────────────── */
const BASE_COLS = ['Fecha','Manifiesto','Cliente','Producto','Enviadas','Reportadas','x reportar','Precio','Venta','Gastos','Comisión CBE','Total','Real + Est'];
const NUM_COLS  = new Set(['Enviadas','Reportadas','x reportar','Precio','$ KG','Venta','Gastos','Subtotal','Comisión','Comisión CBE','Total','Estimado','Real + Est']);
const AMT_COLS  = new Set(['Precio','Venta','Gastos','Subtotal','Comisión','Comisión CBE','Total','Estimado','Real + Est']);

function applyRender() {
  let rows    = getActiveRows();
  const isTot = activeProduct === 'Totales';
  const total = rows.length;

  // Date range filter
  const desde  = document.getElementById('fDesde').value;
  const hasta  = document.getElementById('fHasta').value;
  const dDesde = desde ? new Date(desde) : null;
  const dHasta = hasta ? new Date(hasta + 'T23:59:59') : null;
  if (dDesde || dHasta) {
    rows = rows.filter(r => {
      const d = parseDate(r['Fecha']);
      if (!d) return false;
      if (dDesde && d < dDesde) return false;
      if (dHasta && d > dHasta) return false;
      return true;
    });
  }

  // Cliente filter
  const fCliente = document.getElementById('fCliente').value;
  if (fCliente) rows = rows.filter(r => String(r['Cliente'] ?? '') === fCliente);

  // Build columns; inject _Producto in Totales after Cliente
  let cols = BASE_COLS.filter(c => rows.some(r => r[c] != null && r[c] !== ''));
  if (isTot) {
    const ci = cols.indexOf('Cliente');
    ci >= 0 ? cols.splice(ci + 1, 0, '_Producto') : cols.unshift('_Producto');
  }

  // Text search
  const q = document.getElementById('search').value.toLowerCase().trim();
  if (q) rows = rows.filter(r => cols.some(c => String(r[c] ?? '').toLowerCase().includes(q)));

  // Sort
  rows = sortRows(rows, sortCol);

  document.getElementById('ttitle').textContent = activeProduct;

  if (!rows.length) {
    document.getElementById('twrap').innerHTML = `<div class="empty">Sin datos</div>`;
    document.getElementById('sl').textContent  = '0 filas';
    document.getElementById('sr').textContent  = '';
    return;
  }

  // Header with sort indicators
  const head = `<thead><tr>${cols.map(c => {
    const isNum = NUM_COLS.has(c);
    const cls   = ['sortable', isNum ? 'num-col' : '',
                   sortCol === c ? (sortDir === 1 ? 'sort-asc' : 'sort-desc') : ''].filter(Boolean).join(' ');
    return `<th class="${cls}" onclick="toggleSort('${escHtml(c)}')">${escHtml(colLabel(c))}</th>`;
  }).join('')}</tr></thead>`;

  // Body
  const body = rows.map(r => `<tr>${cols.map(c => {
    const v = r[c];
    if (v === null || v === '' || v === undefined)
      return `<td class="${NUM_COLS.has(c) ? 'num-col' : ''}"><span class="rno">—</span></td>`;
    if (NUM_COLS.has(c)) {
      const n = parseFloat(v);
      if (!isNaN(n)) {
        const txt = AMT_COLS.has(c) ? fmtAmt(n) : fmtN(n);
        return `<td class="num-col${n < 0 ? ' neg' : n === 0 ? ' dim' : ''}">${txt}</td>`;
      }
    }
    if (c === 'Manifiesto') {
      const num = String(v).trim();
      const extra = pdfList[num]
        ? ` <a class="link-pdf" href="/api/manifiesto-pdf/${encodeURIComponent(num)}" target="_blank" title="Ver PDF">📄</a>`
        : ` <label class="btn-upload" title="Subir PDF del manifiesto">⬆<input type="file" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="uploadManifiestoPDF('${escHtml(num)}',this)"></label>`;
      return `<td style="white-space:nowrap">${escHtml(num)}${extra}</td>`;
    }
    return `<td>${escHtml(String(v))}</td>`;
  }).join('')}</tr>`).join('');

  // Footer totals for numeric columns
  const foot = `<tfoot><tr>${cols.map((c, i) => {
    if (i === 0) return `<td>TOTALES</td>`;
    if (!NUM_COLS.has(c)) return `<td></td>`;
    const tot = rows.reduce((s, r) => s + (parseFloat(r[c]) || 0), 0);
    const txt = AMT_COLS.has(c) ? fmtAmt(tot) : fmtN(tot);
    return `<td class="num-col${tot < 0 ? ' neg' : ''}">${txt}</td>`;
  }).join('')}</tr></tfoot>`;

  document.getElementById('twrap').innerHTML =
    `<table>${head}<tbody>${body}</tbody>${foot}</table>`;

  const totEnv  = rows.reduce((s, r) => s + (parseFloat(r['Enviadas']) || 0), 0);
  const totVent = rows.reduce((s, r) => s + (parseFloat(r['Venta'])    || 0), 0);
  const totNet  = rows.reduce((s, r) => s + (parseFloat(r['Total'])    || 0), 0);

  document.getElementById('sl').textContent = `${rows.length} de ${total} ventas`;
  document.getElementById('sr').textContent =
    `Cajas: ${fmtN(totEnv)} · Venta: ${fmtAmt(totVent)} · Neto H2E: ${fmtAmt(totNet)}`;
}

/* ── CSV export ─────────────────────────────────────────────────────────────── */
function exportCSV() {
  let rows    = getActiveRows();
  const isTot = activeProduct === 'Totales';
  let cols    = BASE_COLS.filter(c => rows.some(r => r[c] != null));
  if (isTot) {
    const ci = cols.indexOf('Cliente');
    ci >= 0 ? cols.splice(ci + 1, 0, '_Producto') : cols.unshift('_Producto');
  }
  const q = document.getElementById('search').value.toLowerCase().trim();
  if (q) rows = rows.filter(r => cols.some(c => String(r[c] ?? '').toLowerCase().includes(q)));
  rows = sortRows(rows, sortCol);
  const e   = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
  const csv = [cols.map(c => e(colLabel(c))).join(','),
               ...rows.map(r => cols.map(c => e(r[c])).join(','))].join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `CBE_${activeProduct}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

/* ── Cobros ──────────────────────────────────────────────────────────────────── */
const COBROS_COLS     = ['Fecha','Manifiesto','Liquidación','Cliente','Cajas','Precio','Monto','Pago a H2E','Fecha Pago','Monto Pago'];
const COBROS_NUM_COLS = new Set(['Cajas','Precio','Monto','Monto Pago']);
const COBROS_AMT_COLS = new Set(['Precio','Monto','Monto Pago']);

function renderCobrosTabs() {
  const { products } = cobrosData;
  if (!products?.length) { document.getElementById('cobrosTabs').innerHTML = ''; return; }
  document.getElementById('cobrosTabs').innerHTML = products.map(p =>
    `<div class="cobros-tab${p === activeCobros ? ' active' : ''}" onclick="switchCobros('${escHtml(p)}')">${escHtml(p)}</div>`
  ).join('');
}

function switchCobros(name) {
  activeCobros = name;
  renderCobrosTabs();
  renderCobrosTable();
}

function renderCobrosTable() {
  const rows = (cobrosData.sheets || {})[activeCobros] || [];
  const comp = cobrosData.comprobantes || {};
  const wrap = document.getElementById('cobrosWrap');

  if (!rows.length) {
    wrap.innerHTML = '<div class="empty">Sin datos</div>';
    document.getElementById('cobrosSL').textContent = '0 filas';
    document.getElementById('cobrosSR').textContent = '';
    return;
  }

  const cols = COBROS_COLS.filter(c => rows.some(r => r[c] != null && r[c] !== ''));

  const head = `<thead><tr>${cols.map(c =>
    `<th class="${COBROS_NUM_COLS.has(c) ? 'num-col' : ''}">${escHtml(c)}</th>`
  ).join('')}<th>Comprobante</th></tr></thead>`;

  const body = rows.map(r => {
    const cells = cols.map(c => {
      const v = r[c];
      if (v === null || v === '' || v === undefined)
        return `<td class="${COBROS_NUM_COLS.has(c) ? 'num-col' : ''}"><span class="rno">—</span></td>`;
      if (COBROS_NUM_COLS.has(c)) {
        const n = parseFloat(v);
        if (!isNaN(n)) {
          const txt = COBROS_AMT_COLS.has(c) ? fmtAmt(n) : fmtN(n);
          return `<td class="num-col${n < 0 ? ' neg' : n === 0 ? ' dim' : ''}">${txt}</td>`;
        }
      }
      if (c === 'Pago a H2E') {
        const s = String(v).toLowerCase();
        const cls = s === 'pagado' ? 'chip chip-ok' : 'chip chip-pen';
        return `<td><span class="${cls}">${escHtml(v)}</span></td>`;
      }
      return `<td>${escHtml(String(v))}</td>`;
    }).join('');

    const num = String(r['Manifiesto'] || '').trim();
    const compFile = comp[num];
    const compCell = num
      ? (compFile
          ? `<td><a class="link-pdf" href="/api/comprobante/${encodeURIComponent(num)}" target="_blank">📄 Ver</a></td>`
          : `<td><label class="btn-upload" title="Adjuntar comprobante">📎 Adjuntar<input type="file" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="uploadComprobante('${escHtml(num)}',this)"></label></td>`)
      : '<td></td>';

    return `<tr>${cells}${compCell}</tr>`;
  }).join('');

  const foot = `<tfoot><tr>${cols.map((c, i) => {
    if (i === 0) return `<td>TOTALES</td>`;
    if (!COBROS_NUM_COLS.has(c)) return `<td></td>`;
    const tot = rows.reduce((s, r) => s + (parseFloat(r[c]) || 0), 0);
    const txt = COBROS_AMT_COLS.has(c) ? fmtAmt(tot) : fmtN(tot);
    return `<td class="num-col">${txt}</td>`;
  }).join('')}<td></td></tr></tfoot>`;

  wrap.innerHTML = `<table>${head}<tbody>${body}</tbody>${foot}</table>`;

  const pagados   = rows.filter(r => String(r['Pago a H2E'] || '').toLowerCase() === 'pagado').length;
  const pendientes = rows.length - pagados;
  const totMonto  = rows.reduce((s, r) => s + (parseFloat(r['Monto']) || 0), 0);
  const totPagado = rows.reduce((s, r) =>
    String(r['Pago a H2E'] || '').toLowerCase() === 'pagado' ? s + (parseFloat(r['Monto']) || 0) : s, 0);

  document.getElementById('cobrosSL').textContent = `${rows.length} manifiestos · ${pagados} pagados · ${pendientes} pendientes`;
  document.getElementById('cobrosSR').textContent = `Total: ${fmtAmt(totMonto)} · Cobrado: ${fmtAmt(totPagado)}`;
}

async function uploadManifiestoPDF(num, input) {
  if (!input.files[0]) return;
  const fd = new FormData();
  fd.append('file', input.files[0]);
  try {
    const res = await fetch(`/api/upload-manifiesto/${encodeURIComponent(num)}`, { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    pdfList[num] = data.file;
    applyRender();
  } catch(e) {
    alert('Error al subir manifiesto: ' + e.message);
  }
}

async function uploadComprobante(num, input) {
  if (!input.files[0]) return;
  const fd = new FormData();
  fd.append('file', input.files[0]);
  try {
    const res = await fetch(`/api/upload-comprobante/${encodeURIComponent(num)}`, { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    cobrosData.comprobantes[num] = data.file;
    renderCobrosTable();
  } catch(e) {
    alert('Error al subir comprobante: ' + e.message);
  }
}

/* ── Helpers ────────────────────────────────────────────────────────────────── */
const colLabel = c => c === '_Producto' ? 'Producto' : c;
const fmtAmt   = n => {
  if (n === null || n === undefined) return '—';
  const abs = Math.abs(n);
  const s   = `$${abs.toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
  return n < 0 ? `(${s})` : s;
};
const fmtN    = n => (n === null || n === undefined) ? '—' : Math.round(n).toLocaleString('es-MX');
const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

loadData();
